name: Scheduled TikTok Post

on:
  schedule:
    # Every day at 16:00 UTC. Adjust to your audience's peak hours.
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: tiktok/requirements.txt

      - name: Install deps
        run: pip install -r tiktok/requirements.txt

      - name: Post next queued video
        env:
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_DEFAULT_PRIVACY: SELF_ONLY
        working-directory: tiktok
        run: python -m src.cli post-next --queue ../uploads/queue --archive ../uploads/posted
